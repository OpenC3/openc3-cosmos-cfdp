# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Playwright Tests

# Only run on a push to master to avoid running for all the dependabot PRs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openc3-build-test:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    # Without this the default job timeout is 6 hours. A stalled Playwright
    # browser download (see the retry step below) would otherwise burn the
    # full 6 hours before failing.
    timeout-minutes: 90
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: OpenC3/cosmos-project.git
          path: cosmos
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - name: Install Playwright dependencies
        run: pnpm install --frozen-lockfile
        working-directory: playwright
      # Install the apt OS dependencies separately from the browser binary.
      # This part uses apt (not the CDN) and completes reliably.
      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps chromium
        working-directory: playwright
        timeout-minutes: 10
      # The Chromium download from cdn.playwright.dev intermittently stalls
      # mid-stream, and `playwright install` has no download timeout of its
      # own, so a stall hangs forever (burning the whole job). Wrap each
      # attempt in `timeout` so a stalled download is force-killed (SIGKILL
      # via --kill-after) and retried, instead of hanging.
      - name: Install Playwright browser (chromium)
        working-directory: playwright
        timeout-minutes: 40
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Chromium download attempt ${attempt}"
            if timeout --kill-after=30s 6m pnpm exec playwright install chromium; then
              echo "Chromium installed successfully on attempt ${attempt}"
              echo "::endgroup::"
              exit 0
            fi
            echo "Attempt ${attempt} stalled or failed; retrying..."
            echo "::endgroup::"
            sleep 10
          done
          echo "Failed to install Chromium after 5 attempts"
          exit 1
      - name: Check for test.only
        run: pnpm playwright test --list --forbid-only
        working-directory: playwright
      - name: openc3.sh run
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        run: ./openc3.sh run
        working-directory: cosmos
        # Allow the containers to spin up
      - name: Sleep for 2min
        run: sleep 120s
        shell: bash
        # Check container status
      - name: Check container status
        shell: 'script -q -e -c "bash {0}"'
        run: |
          docker ps
          docker logs cosmos-openc3-cosmos-init-1
          docker logs cosmos-openc3-operator-1
        # Build a test plugin for playwright
      - name: Build plugin
        shell: 'script -q -e -c "bash {0}"'
        run: |
          rake build VERSION=0.0.0
      - name: Run Playwright tests
        # Run separately to allow for parallelism
        run: |
          pnpm playwright test
        working-directory: playwright
        # Check container status
      - name: Check container status
        if: always() # Upload on pass or fail
        shell: 'script -q -e -c "bash {0}"'
        run: |
          docker ps
          docker logs cosmos-openc3-cosmos-cmd-tlm-api-1
          docker logs cosmos-openc3-cosmos-script-runner-api-1
          docker logs cosmos-openc3-operator-1
        # Build a test plugin for playwright and a copy so we can 'upgrade'
      - name: Upload test artifacts
        if: always() # Upload on pass or fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright
          path: playwright/test-results
