name: Playwright Tests

# Only run on a push to master to avoid running for all the dependabot PRs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openc3-build-test:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: OpenC3/cosmos-project.git
          path: cosmos
          ref: main
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - name: Install Playwright dependencies
        run: pnpm install --frozen-lockfile
        working-directory: playwright
      - name: Install Playwright browsers
        # Retry to survive cdn.playwright.dev download stalls; timeout so a stall
        # fails fast instead of hanging the job (install normally takes <2min)
        timeout-minutes: 10
        working-directory: playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Check for test.only
        run: pnpm playwright test --list --forbid-only
        working-directory: playwright
      - name: openc3.sh run
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        run: ./openc3.sh run
        working-directory: cosmos
        # Allow the containers to spin up
      - name: Sleep for 2min
        run: sleep 120s
        shell: bash
        # Check container status
      - name: Check container status
        shell: 'script -q -e -c "bash {0}"'
        run: |
          docker ps
          docker logs cosmos-openc3-cosmos-init-1
          docker logs cosmos-openc3-operator-1
        # Build a test plugin for playwright
      - name: Build plugin
        shell: 'script -q -e -c "bash {0}"'
        run: |
          rake build VERSION=0.0.0
      - name: Run Playwright tests
        # Run separately to allow for parallelism
        run: |
          pnpm playwright test
        working-directory: playwright
        # Check container status
      - name: Check container status
        if: always() # Upload on pass or fail
        shell: 'script -q -e -c "bash {0}"'
        run: |
          docker ps
          docker logs cosmos-openc3-cosmos-cmd-tlm-api-1
          docker logs cosmos-openc3-cosmos-script-runner-api-1
          docker logs cosmos-openc3-operator-1
        # Build a test plugin for playwright and a copy so we can 'upgrade'
      - name: Upload test artifacts
        if: always() # Upload on pass or fail
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright
          path: playwright/test-results
