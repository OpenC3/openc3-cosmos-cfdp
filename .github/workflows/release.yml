# documentation.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string"
        required: true
        type: string

jobs:
  release:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: 3.4
      - name: Publish Gems Rubygems.org
        run: |
          rake build VERSION=${{ github.event.inputs.version }}
          gem push openc3-cosmos-cfdp-${{ github.event.inputs.version }}.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
      - name: create tag for release
        uses: pkgdeps/git-tag-action@a5a161774bace8b4e1969dd850c67a7421f1b710 # v3.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          git_commit_sha: ${{ github.sha }}
          version: ${{ github.event.inputs.version }}
          git_tag_prefix: "v"
